name: Deploy to Oracle VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy přes SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          # Run the deploy script from the repository on the remote host.
          # Use bash to execute the script so it runs even if not marked executable.
          script: |
            bash ./slevobot/deploy