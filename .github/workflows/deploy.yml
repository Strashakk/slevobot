name: Deploy to Oracle VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy přes SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          # Change to the repository directory on the remote host, fail fast if missing,
          # pull latest changes and execute the deploy script. The remote exit code is
          # printed explicitly so GitHub Actions logs show whether deploy succeeded.
          script: |
            set -u
            REPO_DIR=~/slevobot
            if [ ! -d "$REPO_DIR" ]; then
              echo "Repository directory $REPO_DIR not found on remote host"
              exit 1
            fi
            cd "$REPO_DIR"
            git pull origin main || { echo "git pull failed"; exit 1; }
            bash ./deploy.sh
            DEPLOY_STATUS=$?
            echo "DEPLOY_STATUS=${DEPLOY_STATUS}"
            exit "$DEPLOY_STATUS"